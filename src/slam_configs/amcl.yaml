amcl:
  ros__parameters:
    use_sim_time: false

    scan_topic: scan

    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map

    set_initial_pose: true

    min_particles: 500
    max_particles: 2000

    update_min_d: 0.05
    update_min_a: 0.05

    laser_model_type: likelihood_field
    laser_likelihood_max_dist: 2.0

    max_beams: 60

    z_hit: 0.95
    z_rand: 0.05

    sigma_hit: 0.2