ekf_filter_node:
  ros__parameters:

    frequency: 30.0
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # -------------------------
    # RF2O ODOMETRY
    # -------------------------
    odom0: /odom_rf2o
    odom0_config: [true,  true,  false,   # x, y
                   false, false, true,    # yaw
                   false, false, false,   # vx, vy, vz
                   false, false, false,   # roll rate, pitch rate, yaw rate
                   false, false, false]   # accel

    odom0_differential: false
    odom0_relative: false

    # -------------------------
    # IMU
    # -------------------------
    imu0: /imu
    imu0_config: [false, false, false,    # position
                  false, false, false,    # orientation (we don't use absolute)
                  false, false, false,    # linear velocity
                  false, false, true,     # yaw rate
                  false, false, false]    # accel

    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: false